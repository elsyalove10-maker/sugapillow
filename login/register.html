<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Daftar – Dunia Tere Liye</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="auth.css"/>
</head>
<body>

  <div class="auth-page">
    <div class="auth-left">
      <a href="../index.html" class="back-btn">← Kembali ke Beranda</a>
      <div class="auth-brand">
        <span class="brand-icon">📚</span>
        <h1>Dunia <em>Tere Liye</em></h1>
        <p>Daftar gratis dan nikmati koleksi buku Tere Liye</p>
      </div>
    </div>

    <div class="auth-right">
      <div class="auth-card">
        <div class="auth-card-header">
          <h2>Buat Akun Baru ✨</h2>
          <p>Daftar gratis dan nikmati koleksi buku Tere Liye</p>
        </div>

        <form id="registerForm" novalidate>
          <div class="form-group">
            <label for="regUsername">Username</label>
            <div class="input-wrapper">
              <span class="input-icon">👤</span>
              <input type="text" id="regUsername" placeholder="Pilih username unikmu" required />
            </div>
          </div>

          <div class="form-group">
            <label for="regEmail">Email</label>
            <div class="input-wrapper">
              <span class="input-icon">📧</span>
              <input type="email" id="regEmail" placeholder="email@kamu.com" required />
            </div>
          </div>

          <div class="form-group">
            <label for="regPassword">Password</label>
            <div class="input-wrapper">
              <span class="input-icon">🔒</span>
              <input type="password" id="regPassword" placeholder="Minimal 6 karakter" required />
              <button type="button" class="toggle-pw" id="regTogglePw" onclick="togglePasswordRegister()">👁️</button>
            </div>
          </div>

          <div class="form-group">
            <label for="regConfirmPassword">Konfirmasi Password</label>
            <div class="input-wrapper">
              <span class="input-icon">🔒</span>
              <input type="password" id="regConfirmPassword" placeholder="Konfirmasi Password" required />
            </div>
          </div>

          <button type="submit" class="btn-submit">
            <span>Daftar Sekarang</span>
          </button>
        </form>

        <p class="auth-switch">
          Sudah punya akun?
          <a href="index.html">Masuk di sini</a>
        </p>
      </div>
    </div>
  </div>

  <script src="register.js"></script>
</body>
</html>
